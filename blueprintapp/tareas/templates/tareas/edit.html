{% extends "base.html" %}

{% block title %}Editar Tarea{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1 class="h3">Editar Tarea</h1>
    </div>
    <div class="card-body">
        <form action="{{ url_for('bp_tarea.edit', id=tarea.id) }}" method="POST">
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción:</label>
                <input type="text" class="form-control" name="descripcion" value="{{ tarea.descripcion }}" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="completado" id="completado" {% if tarea.completado %}checked{% endif %}>
                <label class="form-check-label" for="completado">Completado</label>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a href="{{ url_for('bp_tarea.index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
